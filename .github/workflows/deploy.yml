name: Deploy Frontend

on:
  push:
    branches: [dev, main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 60s
          command_timeout: 10m
          script: |
            set -e

            # Determine environment from branch
            if [ "${{ github.ref_name }}" = "main" ]; then
              ENV=prod
            else
              ENV=dev
            fi

            echo "=== Deploying Frontend ($ENV) ==="
            cd /opt/ptba/$ENV

            # Pull both repos (Dockerfile builds both FE + API)
            cd ptba-partner-selection
            git fetch origin ${{ github.ref_name }}
            git checkout ${{ github.ref_name }}
            git pull origin ${{ github.ref_name }}
            cd ..

            cd ptba-partner-selection-api
            git fetch origin ${{ github.ref_name }}
            git checkout ${{ github.ref_name }}
            git pull origin ${{ github.ref_name }}
            cd ..

            # Build first (app stays running), then swap
            docker compose --env-file .env build app
            docker compose --env-file .env up -d --force-recreate --no-deps app

            echo "=== Frontend deploy ($ENV) complete ==="
